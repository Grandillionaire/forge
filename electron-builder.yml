appId: app.forge.studio
productName: Forge
directories:
  buildResources: build
files:
  - "!**/.vscode/*"
  - "!src/*"
  - "!scripts/*"
  - "!electron.vite.config.{js,ts,mjs,cjs}"
  - "!{tsconfig,tsconfig.node,tsconfig.web}.json"
asarUnpack:
  - resources/**

publish:
  provider: github
  releaseType: release

mac:
  category: public.app-category.graphics-design
  target:
    - target: dmg
      arch: [arm64, x64]
  hardenedRuntime: false
  gatekeeperAssess: false
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - target: nsis
      arch: [x64, arm64]
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
  category: Graphics
  artifactName: ${productName}-${version}-${arch}.${ext}
